<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<link href="../../css/style.css" rel="stylesheet">
	<link href="../../css/pregunta.css" rel="stylesheet">
	<script src="../../js/data.js"></script>
	<script src="../../js/pregunta.js"></script>
</head>

<body>

	<nav>
		<div class="container">
			<a id="volver" href="../razonamiento_cuantitativo.html">Volver</a>
		</div>
	</nav>

	<main>

		<div id="paper">
			<div class="pregunta">
				<h4 id="contexto"></h4>
				<img id="img" src="" alt="grafico">
				<i id="question">pregunta</i>
				<div class="answer">
					<input id="input0" type="radio" name="answered" value="0">
					<label for="input0" id="label0">A.</label>
				</div>
				<div class="answer">
					<input id="input1" type="radio" name="answered" value="1">
					<label for="input1" id="label1">B.</label>
				</div>
				<div class="answer">
					<input id="input2" type="radio" name="answered" value="2">
					<label for="input2" id="label2">C.</label>
				</div>
				<div class="answer">
					<input id="input3" type="radio" name="answered" value="3">
					<label for="input3" id="label3">D.</label>
				</div>
				<button id="respuesta-button" type="button" onclick='responder()'>Responder!</button>
			</div>
		</div>

		<dialog id="correcta_dialog">
			<img src="../../assets/images/fox_1.png" alt="fox" height=64>
			<h3>¡Bien hecho!</h3>
			<button class="modal_close" commandfor="correcta_dialog" command="close" type="button">
				¡Genial!
			</button>
		</dialog>

		<dialog id="incorrecta_dialog">
			<img src="../../assets/images/fox_1.png" alt="fox" height=64>
			<h3>¡Casi lo logramos!</h3>
			<video id="video_retroalimentacion" width="640" height="480" controls>
				<source src="" type="video/mp4">
			</video>
			<button class="modal_close" commandfor="incorrecta_dialog" command="close" type="button">
				¡Entendido!
			</button>
		</dialog>

	</main>


</body>

</html>
